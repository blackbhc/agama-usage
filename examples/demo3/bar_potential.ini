# Barred galaxy potential: exponential disk + massive Ferrers bar + NFW halo
# No bulge. Bar mass = 5x for stronger bar-driven dynamics.
# Units: 1 kpc, 1 km/s, 1 Msun

[Potential disk]
type = Disk
mass = 6e10
scaleRadius = 3.0
scaleHeight = 0.3
sersicIndex = 1.0

[Potential bar]
# Ferrers bar: triaxial, elongated along x-axis. Mass = 5x original.
type = Ferrers
mass = 1e11
scaleRadius = 4.0
axisRatioY = 0.35
axisRatioZ = 0.2

[Potential halo]
type = NFW
mass = 1e12
scaleRadius = 15.0
