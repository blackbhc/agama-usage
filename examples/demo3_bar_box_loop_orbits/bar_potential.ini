# Test 3: Barred Milky Way Potential
# Spherical bulge + exponential disk + Ferrers bar + NFW halo
# Units: 1 kpc, 1 km/s, 1 Msun

[Potential bulge]
type = Spheroid
densityNorm = 5e10
scaleRadius = 0.5
gamma = 0.5
beta = 3.5
outerCutoffRadius = 3.0

[Potential disk]
type = Disk
mass = 6e10
scaleRadius = 3.0
scaleHeight = 0.3
sersicIndex = 1.0

[Potential bar]
# Ferrers bar: triaxial, elongated along x-axis
type = Ferrers
mass = 2e10
scaleRadius = 4.0
axisRatioY = 0.35
axisRatioZ = 0.2

[Potential halo]
type = NFW
mass = 1e12
scaleRadius = 15.0
